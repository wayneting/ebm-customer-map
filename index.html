<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EBM 客戶市場地圖</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700&family=JetBrains+Mono:wght@400;600&display=swap');
  :root {
    --bg:#080d18;--surface:#0f1923;--surface2:#162030;--border:#1e3048;
    --accent:#0e6b7a;--accent2:#14b8a6;--text:#e2e8f0;--text-dim:#5a7a9a;
    --c-center:#ef4444;--c-region:#f97316;--c-district:#eab308;
    --c-clinic:#3b82f6;--c-deployed:#22c55e;--c-talking:#f97316;
  }
  *{margin:0;padding:0;box-sizing:border-box}
  body{background:var(--bg);color:var(--text);font-family:'Noto Sans TC',sans-serif;height:100vh;display:flex;flex-direction:column;overflow:hidden}
  .header{background:var(--surface);border-bottom:1px solid var(--border);padding:0 16px;height:52px;display:flex;align-items:center;gap:12px;flex-shrink:0;z-index:100;overflow-x:auto}
  .logo{font-size:14px;font-weight:700;color:var(--accent2);white-space:nowrap}
  .logo span{color:var(--text-dim);font-weight:300}
  .divider{width:1px;height:24px;background:var(--border);flex-shrink:0}
  .filter-row{display:flex;align-items:center;gap:6px;flex:1;overflow-x:auto;scrollbar-width:none}
  .filter-row::-webkit-scrollbar{display:none}
  .filter-label{font-size:11px;color:var(--text-dim);white-space:nowrap}
  .btn{display:inline-flex;align-items:center;gap:4px;padding:4px 10px;border-radius:6px;border:1px solid var(--border);background:transparent;color:var(--text-dim);font-size:11px;font-family:'Noto Sans TC',sans-serif;cursor:pointer;white-space:nowrap;transition:all .15s}
  .btn.active{border-color:var(--accent2);color:var(--accent2);background:rgba(20,184,166,.08)}
  .btn:hover{border-color:var(--accent2);color:var(--text)}
  .dot{width:7px;height:7px;border-radius:50%}
  .stats-pill{margin-left:auto;display:flex;align-items:center;gap:10px;flex-shrink:0}
  .stat-item{text-align:center}
  .stat-num{font-size:15px;font-weight:700;font-family:'JetBrains Mono',monospace;color:var(--accent2);line-height:1}
  .stat-lbl{font-size:9px;color:var(--text-dim);margin-top:1px}
  .main{display:flex;flex:1;overflow:hidden}
  #map{flex:1;height:100%}
  .side{width:280px;background:var(--surface);border-left:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden;flex-shrink:0}
  .side-header{padding:12px 14px;border-bottom:1px solid var(--border);font-size:11px;font-weight:600;color:var(--text-dim);text-transform:uppercase;letter-spacing:.8px;display:flex;justify-content:space-between;align-items:center}
  .side-list{flex:1;overflow-y:auto;padding:6px}
  .side-list::-webkit-scrollbar{width:3px}
  .side-list::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}
  .hcard{padding:9px 11px;border-radius:7px;border:1px solid transparent;cursor:pointer;margin-bottom:3px;transition:all .15s}
  .hcard:hover{background:var(--surface2);border-color:var(--border)}
  .hcard.selected{background:rgba(14,107,122,.12);border-color:var(--accent)}
  .hcard-top{display:flex;align-items:flex-start;gap:7px}
  .hlevel-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0;margin-top:4px}
  .hname{font-size:12px;font-weight:500;color:var(--text);line-height:1.4;flex:1}
  .hmeta{display:flex;align-items:center;gap:5px;margin-top:4px;padding-left:14px}
  .tag-sm{padding:1px 6px;border-radius:3px;font-size:10px;font-weight:600}
  .hcity{font-size:10px;color:var(--text-dim)}
  .info-panel{border-top:1px solid var(--border);padding:14px;background:var(--surface2);min-height:150px;max-height:190px;overflow-y:auto}
  .info-panel.empty{display:flex;align-items:center;justify-content:center;color:var(--text-dim);font-size:12px}
  .info-name{font-size:13px;font-weight:700;color:var(--text);margin-bottom:9px;line-height:1.4}
  .info-row{display:flex;gap:7px;margin-bottom:5px;font-size:11px}
  .info-key{color:var(--text-dim);width:48px;flex-shrink:0}
  .info-val{color:var(--text);flex:1;line-height:1.5}
  .info-val a{color:var(--accent2);text-decoration:none}
  .legend{padding:10px 14px;border-top:1px solid var(--border)}
  .legend-title{font-size:10px;color:var(--text-dim);text-transform:uppercase;letter-spacing:.8px;margin-bottom:7px}
  .legend-grid{display:grid;grid-template-columns:1fr 1fr;gap:4px}
  .legend-item{display:flex;align-items:center;gap:5px;font-size:10px;color:var(--text-dim)}
  .legend-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
  .sync-time{font-size:9px;color:var(--text-dim);padding:6px 14px;border-top:1px solid var(--border);text-align:right}
  .loading-overlay{position:fixed;inset:0;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:9999;transition:opacity .4s}
  .loading-overlay.hidden{opacity:0;pointer-events:none}
  .loading-logo{font-size:22px;font-weight:700;color:var(--accent2);margin-bottom:20px}
  .loading-bar{width:180px;height:2px;background:var(--border);border-radius:1px;overflow:hidden}
  .loading-bar-fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--accent2));animation:lb 1.5s ease-in-out forwards}
  @keyframes lb{0%{width:0}60%{width:80%}100%{width:100%}}
  .loading-text{margin-top:10px;font-size:11px;color:var(--text-dim)}
  .iw-content{padding:12px 14px;min-width:200px}
  .iw-name{font-size:13px;font-weight:700;color:#e2e8f0;margin-bottom:7px;font-family:'Noto Sans TC',sans-serif}
  .iw-row{font-size:11px;color:#5a7a9a;margin-bottom:3px;font-family:'Noto Sans TC',sans-serif}
  .iw-row span{color:#94a3b8;margin-left:4px}
  .iw-status{display:inline-block;padding:2px 7px;border-radius:3px;font-size:10px;font-weight:600;margin-top:5px;font-family:'Noto Sans TC',sans-serif}
  .gm-style .gm-style-iw-c{background:var(--surface)!important;border:1px solid var(--border)!important;border-radius:10px!important;padding:0!important;box-shadow:0 8px 32px rgba(0,0,0,.5)!important}
  .gm-style .gm-style-iw-tc::after{background:var(--surface)!important}
</style>
</head>

<div class="loading-overlay" id="loadingOverlay">
  <div class="loading-logo">🏥 EBM 客戶地圖</div>
  <div class="loading-bar"><div class="loading-bar-fill"></div></div>
  <div class="loading-text" id="loadingText">載入醫院資料中...</div>
</div>

<div class="header">

    <button class="btn" onclick="filterLevel('區域醫院')" id="btn-region"><span class="dot" style="background:var(--c-region)"></span>區域醫院</button>
    <button class="btn" onclick="filterLevel('地區醫院')" id="btn-district"><span class="dot" style="background:var(--c-district)"></span>地區醫院</button>
    <div class="divider"></div>
    <div class="filter-label">模式</div>

</div>

const LEVEL_COLORS = {'醫學中心':'#ef4444','區域醫院':'#f97316','地區醫院':'#eab308','診所':'#3b82f6','衛生所':'#22d3ee','合作廠商':'#a78bfa'};
const STATUS_COLORS = {'已部署':'#22c55e','維護中':'#3b82f6','洽談中':'#f97316','潛在客戶':'#475569','暫停':'#ef4444'};
const STATUS_BG = {'已部署':'rgba(34,197,94,.15)','維護中':'rgba(59,130,246,.15)','洽談中':'rgba(249,115,22,.15)','潛在客戶':'rgba(71,85,105,.15)'};

let map, heatmap, markers=[], infoWindow;
let currentFilter='all', currentMode='marker', selectedIdx=-1;

function initMap() {
  map = new google.maps.Map(document.getElementById('map'), {
    center:{lat:23.8,lng:121.0}, zoom:7,
    styles:darkStyle(), disableDefaultUI:false,
    zoomControl:true, mapTypeControl:false, streetViewControl:false,
    fullscreenControl:true, gestureHandling:'greedy'
  });
  infoWindow = new google.maps.InfoWindow({maxWidth:260});
  createMarkers(); createHeatmap(); renderList(); updateStats();
  setTimeout(()=>{
    document.getElementById('loadingText').textContent='地圖載入完成';
    setTimeout(()=>document.getElementById('loadingOverlay').classList.add('hidden'),300);
  },800);
}

function createMarkers() {
  markers.forEach(m=>m.setMap(null)); markers=[];
  HOSPITALS.forEach((h,i)=>{
    const color = (h.status==='已部署'||h.status==='維護中') ? STATUS_COLORS[h.status] : (LEVEL_COLORS[h.level]||'#64748b');
    const m = new google.maps.Marker({
      position:{lat:h.lat,lng:h.lng}, map:currentMode==='marker'?map:null, title:h.name,
      icon:{path:google.maps.SymbolPath.CIRCLE, scale:h.level==='醫學中心'?9:h.level==='區域醫院'?7:5,
        fillColor:color, fillOpacity:.95, strokeColor:'#fff', strokeWeight:1.5},
      zIndex:h.level==='醫學中心'?10:5
    });
    m.addListener('click',()=>selectHospital(i));
    markers.push(m);
  });
}

function createHeatmap() {
  const pts = HOSPITALS.map(h=>({location:new google.maps.LatLng(h.lat,h.lng), weight:h.level==='醫學中心'?3:h.level==='區域醫院'?2:1}));
  heatmap = new google.maps.visualization.HeatmapLayer({
    data:pts, map:null, radius:40, opacity:.8,
    gradient:['rgba(0,0,0,0)','rgba(14,107,122,.4)','rgba(20,184,166,.7)','rgba(250,204,21,.85)','rgba(239,68,68,1)']
  });
}

function filterLevel(level) {
  currentFilter=level;
  ['btn-all','btn-center','btn-region','btn-district'].forEach(id=>document.getElementById(id)?.classList.remove('active'));
  const m={'all':'btn-all','醫學中心':'btn-center','區域醫院':'btn-region','地區醫院':'btn-district'};
  document.getElementById(m[level]||'btn-all')?.classList.add('active');
  HOSPITALS.forEach((_,i)=>markers[i]?.setVisible((level==='all'||HOSPITALS[i].level===level)&&currentMode==='marker'));
  renderList(); updateStats(); infoWindow.close();
}

function setMode(mode) {
  currentMode=mode;
  document.getElementById('mode-marker').classList.toggle('active',mode==='marker');
  document.getElementById('mode-heat').classList.toggle('active',mode==='heat');
  if(mode==='marker'){heatmap.setMap(null);HOSPITALS.forEach((_,i)=>{const v=currentFilter==='all'||HOSPITALS[i].level===currentFilter;markers[i]?.setMap(v?map:null);});}
  else{markers.forEach(m=>m.setMap(null));heatmap.setMap(map);infoWindow.close();}
}

function selectHospital(idx) {
  selectedIdx=idx; const h=HOSPITALS[idx];
  document.querySelectorAll('.hcard').forEach((el,i)=>el.classList.toggle('selected',i===idx));
  document.querySelectorAll('.hcard')[idx]?.scrollIntoView({behavior:'smooth',block:'nearest'});
  const sc=STATUS_COLORS[h.status]||'#64748b', sb=STATUS_BG[h.status]||'rgba(71,85,105,.15)', lc=LEVEL_COLORS[h.level]||'#64748b';
  document.getElementById('infoPanel').classList.remove('empty');
  document.getElementById('infoPanel').innerHTML=`
    <div class="info-name">${h.name}</div>
    <div class="info-row"><div class="info-key">層級</div><div class="info-val"><span style="color:${lc};font-weight:600">${h.level}</span></div></div>
    <div class="info-row"><div class="info-key">縣市</div><div class="info-val">${h.city}</div></div>
    <div class="info-row"><div class="info-key">地址</div><div class="info-val">${h.address}</div></div>
    <div class="info-row"><div class="info-key">電話</div><div class="info-val">${h.phone||'—'}</div></div>
    ${h.website?'<div class="info-row"><div class="info-key">網站</div><div class="info-val"><a href="'+h.website+'" target="_blank">官方網站 ↗</a></div></div>':''}
    <div class="info-row"><div class="info-key">狀態</div><div class="info-val"><span style="background:${sb};color:${sc};padding:2px 8px;border-radius:4px;font-size:10px;font-weight:600">${h.status}</span></div></div>
  `;
  if(currentMode==='marker'){
    infoWindow.setContent(`<div class="iw-content"><div class="iw-name">${h.name}</div><div class="iw-row">📍<span>${h.address}</span></div><div class="iw-row">📞<span>${h.phone||'—'}</span></div><div class="iw-status" style="background:${sb};color:${sc}">${h.status}</div></div>`);
    infoWindow.open(map,markers[idx]); map.panTo({lat:h.lat,lng:h.lng});
  }
}

function renderList() {
  const list=document.getElementById('sideList');
  const visible=HOSPITALS.filter(h=>currentFilter==='all'||h.level===currentFilter);
  document.getElementById('list-count').textContent=visible.length;
  list.innerHTML=HOSPITALS.map((h,i)=>{
    if(currentFilter!=='all'&&h.level!==currentFilter)return'';
    const lc=LEVEL_COLORS[h.level]||'#64748b', sc=STATUS_COLORS[h.status]||'#64748b', sb=STATUS_BG[h.status]||'rgba(71,85,105,.15)';
    return `<div class="hcard ${selectedIdx===i?'selected':''}" onclick="selectHospital(${i})"><div class="hcard-top"><div class="hlevel-dot" style="background:${lc}"></div><div class="hname">${h.name}</div></div><div class="hmeta"><span class="hcity">${h.city}</span><span class="tag-sm" style="background:${sb};color:${sc}">${h.status}</span></div></div>`;
  }).join('');
}

function updateStats() {
  const v=HOSPITALS.filter(h=>currentFilter==='all'||h.level===currentFilter);
  document.getElementById('stat-total').textContent=v.length;
  document.getElementById('stat-deployed').textContent=v.filter(h=>h.status==='已部署'||h.status==='維護中').length;
}

function darkStyle(){return[
  {elementType:'geometry',stylers:[{color:'#0a1628'}]},
  {elementType:'labels.text.fill',stylers:[{color:'#4a6fa5'}]},
  {elementType:'labels.text.stroke',stylers:[{color:'#06101f'}]},
  {featureType:'administrative',elementType:'geometry',stylers:[{color:'#1e3048'}]},
  {featureType:'administrative.locality',elementType:'labels.text.fill',stylers:[{color:'#c4d4e8'}]},
  {featureType:'poi',stylers:[{visibility:'off'}]},
  {featureType:'road',elementType:'geometry',stylers:[{color:'#132036'}]},
  {featureType:'road.highway',elementType:'geometry',stylers:[{color:'#1e3a5f'}]},
  {featureType:'transit',stylers:[{visibility:'off'}]},
  {featureType:'water',elementType:'geometry',stylers:[{color:'#060e1c'}]},
];}
</script>
<script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyAnwSvM0r3ZYdIsCTQ0Cq2Qjm3zcO4L2UM&libraries=visualization&callback=initMap" async defer></script>
